<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | CodeAgents Mastery</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-darker: #050505;
            --bg-card: #121212;
            --accent-bright: #00FF88;
            --border-color: #2A2A2A;
        }
        body {
            font-family: 'DM Sans', sans-serif;
            background-color: var(--bg-darker);
            background-image: radial-gradient(circle at 50% 50%, rgba(0, 255, 136, 0.05) 0%, transparent 50%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }
        .login-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            padding: 3rem;
            border-radius: 24px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            position: relative;
        }
        .login-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 40%;
            height: 2px;
            background: var(--accent-bright);
            box-shadow: 0 0 15px var(--accent-bright);
        }
        h1 { font-family: 'Archivo Black', sans-serif; text-transform: uppercase; letter-spacing: -0.02em; }
        
        input {
            background: #0D0D0D !important;
            border: 1px solid var(--border-color) !important;
            color: white !important;
            transition: all 0.3s ease;
        }
        input:focus {
            border-color: var(--accent-bright) !important;
            box-shadow: 0 0 10px rgba(0, 255, 136, 0.2) !important;
            outline: none;
        }
        .btn-login {
            background: var(--accent-bright);
            color: #050505;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            transition: all 0.3s ease;
        }
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 25px rgba(0, 255, 136, 0.5);
        }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="text-center mb-8">
            <h1 class="text-2xl text-white mb-2">CodeAgents</h1>
            <p class="text-gray-400 text-sm">Enter your credentials to access the portal</p>
        </div>

        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="mb-6">
                <label class="block text-xs font-bold text-gray-500 uppercase tracking-widest mb-2">Email Address</label>
                <input type="email" id="email" required class="w-full p-4 rounded-xl text-sm" placeholder="suresh@example.com">
            </div>

            <div class="mb-8">
                <label class="block text-xs font-bold text-gray-500 uppercase tracking-widest mb-2">Student Password</label>
                <input type="password" id="password" required class="w-full p-4 rounded-xl text-sm" placeholder="••••••••">
            </div>

            <button type="submit" class="btn-login w-full p-4 rounded-xl text-sm mb-6">
                Enter Dashboard
            </button>

            <div class="text-center">
                <a href="index.html" class="text-gray-500 text-xs hover:text-white transition-colors">← Back to Main Website</a>
            </div>
        </form>
    </div>

    <div id="custom-alert" class="hidden fixed top-8 left-1/2 -translate-x-1/2 z-[100] w-[90%] max-w-[400px]">
        <div class="bg-[#121212] border-2 border-red-500/50 rounded-2xl p-4 shadow-[0_0_30px_rgba(239,68,68,0.2)] flex items-center gap-4">
            <div class="w-10 h-10 rounded-full bg-red-500/20 flex items-center justify-center flex-shrink-0">
                <svg class="w-5 h-5 text-red-500" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
            </div>
            <div class="flex-1">
                <h4 class="text-white font-bold text-sm uppercase tracking-wider">Access Denied</h4>
                <p id="alert-message" class="text-gray-400 text-xs mt-1">Invalid credentials. Please try again.</p>
            </div>
            <button onclick="closeAlert()" class="text-gray-600 hover:text-white transition-colors">&times;</button>
        </div>
    </div>

    <style>
        #custom-alert.active {
            display: block;
            animation: slideDown 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes slideDown {
            from { transform: translate(-50%, -100%); opacity: 0; }
            to { transform: translate(-50%, 0); opacity: 1; }
        }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // 1. Initialize Supabase (Use your actual keys here)
        const SUPABASE_URL = 'https://jqxxxnuhkmqtypggxvoz.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_luKyxIHrGwcWLepcJQ6M4Q_aTLl7xHs';
        const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        function showAlert(message) {
            const alertBox = document.getElementById('custom-alert');
            const messageEl = document.getElementById('alert-message');
            
            messageEl.innerText = message;
            alertBox.classList.remove('hidden');
            alertBox.classList.add('active');

            // Auto-hide after 5 seconds
            setTimeout(closeAlert, 5000);
        }

        function closeAlert() {
            const alertBox = document.getElementById('custom-alert');
            alertBox.classList.remove('active');
            setTimeout(() => alertBox.classList.add('hidden'), 400);
        }

        async function handleLogin(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const submitBtn = e.target.querySelector('button');

            submitBtn.innerText = "VERIFYING...";
            submitBtn.disabled = true;

            try {
                // Use 'sb' (the renamed Supabase client from our last step)
                const { data, error } = await sb.auth.signInWithPassword({
                    email: email,
                    password: password,
                });

                if (error) {
                    // BEAUTIFUL POPUP INSTEAD OF WINDOW ALERT
                    showAlert(error.message);
                    submitBtn.innerText = "ENTER DASHBOARD";
                    submitBtn.disabled = false;
                } else {
                    window.location.href = 'dashboard.html';
                }
            } catch (err) {
                showAlert("Connection error. Check your internet.");
                submitBtn.disabled = false;
            }
        }
    </script>
</body>
</html>
